name: Conformance D147

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run full pytest suite
        run: |
          python -m pip install --upgrade pip
          python -m pytest -q

  conformance-d147:
    name: conformance-d147
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run D147 conformance tests
        env:
          BRAINDRIVE_CONFORMANCE_REPORT: ./artifacts/conformance-report.json
        run: |
          python -m pip install --upgrade pip
          python -m pytest -q tests/conformance/test_swap_conformance.py tests/conformance/test_swap_conformance_negative.py tests/conformance/test_conformance_report_schema.py
      - name: Upload conformance report artifact
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: ./artifacts/conformance-report.json
          if-no-files-found: error
